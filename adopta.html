<main>

<section class="pagina">

    <h2>Proceso de Adopción</h2>

    <p>
        Si deseas adoptar una mascota, completa el siguiente formulario.
        Nos comunicaremos contigo para continuar con el proceso.
    </p>

    <form class="formulario">

        <label>Nombre completo</label>
        <input type="text" placeholder="Ingresa tu nombre">

        <label>Correo electrónico</label>
        <input type="email" placeholder="Ingresa tu correo">

        <label>Teléfono</label>
        <input type="tel" placeholder="Ingresa tu teléfono">

        <label>Mascota de interés</label>
        <select>
            <option>Seleccionar</option>
            <option>Max</option>
            <option>Luna</option>
            <option>Toby</option>
        </select>

        <label>¿Por qué deseas adoptar?</label>
        <textarea rows="5" placeholder="Escribe tu respuesta"></textarea>

        <button type="submit" class="btn">
            Enviar solicitud
        </button>

    </form>

</section>

</main>

<footer>
